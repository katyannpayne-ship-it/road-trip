<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1E1E2E">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Bend → Austin Road Trip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

:root {
  --sand: #F2E6D9;
  --clay: #C4734F;
  --rust: #8B3A2A;
  --sage: #7A8B6F;
  --sky: #5B9BD5;
  --night: #1E1E2E;
  --card: #252535;
  --cream: #FFF8F0;
  --gold: #D4A843;
  --green: #8BC58B;
  --dim: rgba(255,248,240,0.45);
  --faint: rgba(255,255,255,0.06);
  --safe-b: env(safe-area-inset-bottom, 0px);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--night);color:var(--cream);overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:flex;
  background:rgba(30,30,46,0.94);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--faint);
  padding-bottom:var(--safe-b);
}
.bottom-nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:0.2rem;
  background:none;border:none;color:var(--dim);
  padding:0.6rem 0;font-family:'Outfit',sans-serif;font-size:0.62rem;
  font-weight:500;letter-spacing:0.03em;cursor:pointer;
  transition:color 0.15s;
}
.bottom-nav button.active{color:var(--gold)}
.bottom-nav button .nav-icon{font-size:1.25rem;line-height:1}

/* ===== VIEW CONTAINER ===== */
.view{display:none;padding-bottom:calc(70px + var(--safe-b))}
.view.active{display:block}

/* ===== DASHBOARD VIEW ===== */
.dash-header{
  padding:2.5rem 1.5rem 1.5rem;
  background:linear-gradient(165deg,#1a1a2e 0%,#2d1b30 40%,#4a2040 70%,#c4734f 100%);
  position:relative;
}
.dash-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,var(--night),transparent)}
.dash-header *{position:relative;z-index:1}

.dash-day-label{
  font-family:'Space Mono',monospace;font-size:0.7rem;
  text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);
  margin-bottom:0.3rem;
}
.dash-title{font-size:1.8rem;font-weight:800;line-height:1.1}
.dash-subtitle{font-size:0.85rem;color:var(--sand);opacity:0.7;margin-top:0.3rem}

.dash-weather{
  display:flex;gap:0;margin:1.25rem 1.5rem 0;
  border-radius:12px;overflow:hidden;border:1px solid var(--faint);
}
.dash-wx{
  flex:1;padding:0.7rem 0.4rem;background:rgba(91,155,213,0.08);
  text-align:center;border-right:1px solid rgba(255,255,255,0.04);
}
.dash-wx:last-child{border-right:none}
.dash-wx .wx-city{font-family:'Space Mono',monospace;font-size:0.55rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--sky);margin-bottom:0.3rem}
.dash-wx .wx-ico{font-size:1.3rem;line-height:1}
.dash-wx .wx-hi{font-weight:700;font-size:0.9rem}
.dash-wx .wx-lo{font-weight:400;font-size:0.72rem;color:var(--dim)}

/* -- next-up cards -- */
.next-cards{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:0.75rem}

.next-card{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 1.25rem;
  background:var(--card);border:1px solid var(--faint);
  border-radius:14px;cursor:pointer;
  transition:transform 0.1s;
  text-decoration:none;
}
.next-card:active{transform:scale(0.98)}

.nc-icon{
  width:44px;height:44px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;flex-shrink:0;
}
.nc-icon.fuel{background:rgba(91,155,213,0.12)}
.nc-icon.food{background:rgba(196,115,79,0.12)}
.nc-icon.see{background:rgba(212,168,67,0.12)}
.nc-icon.sleep{background:rgba(139,197,139,0.12)}
.nc-icon.shop{background:rgba(139,197,139,0.12)}

.nc-body{flex:1;min-width:0}
.nc-label{font-family:'Space Mono',monospace;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--dim)}
.nc-name{font-weight:600;font-size:1rem;margin-top:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc-detail{font-size:0.78rem;color:var(--dim);margin-top:0.1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.nc-arrow{color:var(--dim);font-size:1.2rem;flex-shrink:0}

.nc-mile{
  font-family:'Space Mono',monospace;font-size:0.65rem;
  color:var(--gold);opacity:0.8;flex-shrink:0;text-align:right;
}

/* -- day selector pills -- */
.day-pills{
  display:flex;gap:0.5rem;padding:0 1.5rem 0.5rem;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.day-pills::-webkit-scrollbar{display:none}
.day-pill{
  flex-shrink:0;padding:0.5rem 1rem;border-radius:100px;
  background:var(--card);border:1px solid var(--faint);
  font-family:'Space Mono',monospace;font-size:0.68rem;
  color:var(--dim);cursor:pointer;white-space:nowrap;
  transition:all 0.15s;
}
.day-pill.active{background:var(--gold);color:var(--night);border-color:var(--gold);font-weight:700}

.section-label{
  font-family:'Space Mono',monospace;font-size:0.65rem;
  text-transform:uppercase;letter-spacing:0.12em;
  color:var(--dim);padding:1rem 1.5rem 0.5rem;
}

/* ===== TIMELINE VIEW ===== */
.tl-header{
  padding:2rem 1.5rem 1rem;
  background:linear-gradient(135deg,#1a1a2e,#2d2d3a);
}
.tl-header h2{font-size:1.4rem;font-weight:700}
.tl-header p{font-size:0.78rem;color:var(--dim);margin-top:0.2rem}

.timeline{padding:0 1.5rem 2rem;position:relative}

.tl-day-header{
  display:flex;align-items:center;gap:0.75rem;
  padding:1.5rem 0 0.75rem;
  position:sticky;top:0;z-index:10;
  background:var(--night);
}
.tl-day-dot{
  width:14px;height:14px;border-radius:50%;
  border:3px solid var(--night);flex-shrink:0;
  position:relative;z-index:2;
}
.tl-day-1 .tl-day-dot{background:var(--sage)}
.tl-day-2 .tl-day-dot{background:var(--clay)}
.tl-day-3 .tl-day-dot{background:var(--sky)}
.tl-day-4 .tl-day-dot{background:var(--gold)}
.tl-day-5 .tl-day-dot{background:#5BA8A8}
.tl-day-6 .tl-day-dot{background:#C4A43F}

.tl-day-info{flex:1}
.tl-day-name{font-weight:700;font-size:0.95rem}
.tl-day-route{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--dim)}

.tl-day-miles{
  font-family:'Space Mono',monospace;font-size:0.7rem;
  color:var(--gold);flex-shrink:0;
}

/* -- timeline stops -- */
.tl-stops{
  padding-left:6px;
  border-left:2px solid rgba(255,255,255,0.08);
  margin-left:5px;
}

.tl-stop{
  position:relative;padding:0.6rem 0 0.6rem 1.5rem;
  cursor:pointer;-webkit-user-select:none;user-select:none;
}
.tl-stop::before{
  content:'';position:absolute;left:-6px;top:1rem;
  width:10px;height:10px;border-radius:50%;
  border:2px solid var(--night);
}
.tl-stop.fuel::before{background:var(--sky)}
.tl-stop.food::before{background:var(--clay)}
.tl-stop.sight::before{background:var(--gold)}
.tl-stop.sleep::before{background:var(--green)}
.tl-stop.shop::before{background:var(--green)}
.tl-stop.note::before{background:var(--sage)}

.tl-stop-head{display:flex;align-items:center;gap:0.5rem}
.tl-stop-icon{font-size:0.85rem}
.tl-stop-name{font-weight:600;font-size:0.88rem;flex:1}
.tl-stop-mile{font-family:'Space Mono',monospace;font-size:0.6rem;color:var(--gold);opacity:0.7}
.tl-stop-mapbtn{
  font-size:1rem;flex-shrink:0;text-decoration:none;
  padding:0.2rem;border-radius:6px;
  transition:background 0.15s;
}
.tl-stop-mapbtn:active{background:rgba(91,155,213,0.15)}

.tl-stop-chevron{
  font-size:0.8rem;color:var(--dim);
  transition:transform 0.2s;flex-shrink:0;
}
.tl-stop.open .tl-stop-chevron{transform:rotate(90deg)}

.tl-stop-body{
  max-height:0;overflow:hidden;
  transition:max-height 0.25s ease;
}
.tl-stop.open .tl-stop-body{max-height:300px}

.tl-stop-desc{font-size:0.78rem;color:var(--dim);padding:0.4rem 0 0.2rem;line-height:1.5}
.tl-stop-addr{
  display:inline-flex;align-items:center;gap:0.3rem;
  font-family:'Space Mono',monospace;font-size:0.65rem;
  color:var(--sky);padding:0.3rem 0;
}
.tl-stop-addr .pin{font-style:normal;font-size:0.8rem}

.tl-stop-warn{
  display:inline-block;
  background:rgba(196,115,79,0.2);color:var(--clay);
  font-family:'Space Mono',monospace;font-size:0.55rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
  padding:0.1rem 0.4rem;border-radius:3px;margin-left:0.3rem;
}

.tl-stop-tag{
  display:inline-block;
  font-family:'Space Mono',monospace;font-size:0.5rem;
  text-transform:uppercase;letter-spacing:0.08em;
  padding:0.1rem 0.35rem;border-radius:3px;margin-top:0.2rem;
}
.tl-stop-tag.rv{background:rgba(139,197,139,0.15);color:var(--green)}
.tl-stop-tag.hotel{background:rgba(212,168,67,0.15);color:var(--gold)}

/* ===== PREP VIEW ===== */
.prep-view-header{
  padding:2rem 1.5rem 1rem;
  background:linear-gradient(135deg,#2d2d3a,#35354a);
}
.prep-section{padding:1.25rem 1.5rem}
.prep-section h3{
  font-size:0.75rem;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--gold);margin-bottom:0.75rem;padding-bottom:0.4rem;
  border-bottom:1px solid var(--faint);
}
.prep-item{
  padding:0.5rem 0 0.5rem 2rem;
  font-size:0.85rem;color:rgba(255,248,240,0.75);
  position:relative;cursor:pointer;
  -webkit-user-select:none;user-select:none;
}
.prep-item::before{
  content:'';position:absolute;left:0;top:0.65rem;
  width:14px;height:14px;border:1.5px solid rgba(255,255,255,0.25);
  border-radius:3px;transition:all 0.15s;
}
.prep-item.checked{color:rgba(255,248,240,0.3);text-decoration:line-through}
.prep-item.checked::before{background:var(--sage);border-color:var(--sage)}

.prep-shop{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.75rem 1rem;margin-bottom:0.5rem;
  background:var(--card);border-radius:10px;border:1px solid var(--faint);
}
.prep-shop-name{font-weight:600;font-size:0.85rem;flex:1}
.prep-shop-what{font-size:0.7rem;color:var(--dim)}
.prep-shop a{
  display:flex;align-items:center;gap:0.2rem;
  font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--sky);
  flex-shrink:0;
}

/* ===== INFO VIEW ===== */
.info-section{
  padding:1.25rem 1.5rem;
  border-bottom:1px solid var(--faint);
}
.info-section:last-child{border-bottom:none}
.info-section h3{font-size:0.95rem;margin-bottom:1rem;color:var(--gold)}

.budget-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.75rem}
.budget-cell{text-align:center;padding:0.75rem;background:var(--card);border-radius:10px}
.budget-cell .b-num{font-size:1.4rem;font-weight:700}
.budget-cell .b-label{font-family:'Space Mono',monospace;font-size:0.6rem;text-transform:uppercase;color:var(--dim);margin-top:0.15rem}
.budget-cell.total{grid-column:1/-1;border:1px solid rgba(212,168,67,0.2)}
.budget-cell.total .b-num{color:var(--gold)}

.pack-cat{margin-bottom:1rem}
.pack-cat h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--sage);margin-bottom:0.4rem}
.pack-cat li{
  list-style:none;padding:0.2rem 0 0.2rem 1rem;
  font-size:0.8rem;color:rgba(255,248,240,0.6);position:relative;
}
.pack-cat li::before{content:'~';position:absolute;left:0;color:var(--sage);opacity:0.5}

.trip-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:0.5rem;margin-bottom:1.5rem}
.trip-stat{text-align:center;padding:0.6rem;background:var(--card);border-radius:8px}
.trip-stat .ts-num{font-size:1.2rem;font-weight:700;color:var(--gold)}
.trip-stat .ts-label{font-family:'Space Mono',monospace;font-size:0.55rem;text-transform:uppercase;color:var(--dim)}

/* ===== MAPS VIEW ===== */
.map-section{padding:1.25rem 1.5rem;border-bottom:1px solid var(--faint)}
.map-section:last-child{border-bottom:none}
.map-section h3{font-size:0.85rem;margin-bottom:0.75rem;color:var(--gold)}
.map-section p{font-size:0.78rem;color:var(--dim);line-height:1.5;margin-bottom:0.75rem}

.dl-card{
  display:flex;align-items:center;gap:0.75rem;
  padding:0.75rem 1rem;margin-bottom:0.5rem;
  background:var(--card);border-radius:10px;border:1px solid var(--faint);
  text-decoration:none;color:var(--cream);
  transition:transform 0.1s;
}
.dl-card:active{transform:scale(0.98)}
.dl-card .dl-icon{font-size:1.3rem;flex-shrink:0}
.dl-card .dl-body{flex:1;min-width:0}
.dl-card .dl-title{font-weight:600;font-size:0.82rem}
.dl-card .dl-sub{font-size:0.68rem;color:var(--dim);margin-top:0.1rem}
.dl-card .dl-arrow{color:var(--sky);font-size:1rem;flex-shrink:0}

.strip-map{
  background:var(--card);border-radius:12px;border:1px solid var(--faint);
  padding:1rem;margin-bottom:1rem;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.strip-map svg{display:block;margin:0 auto}
.strip-map-label{
  font-family:'Space Mono',monospace;font-size:0.6rem;
  color:var(--dim);text-align:center;margin-top:0.5rem;
}
.map-tip{
  display:flex;align-items:flex-start;gap:0.5rem;
  padding:0.75rem 1rem;background:rgba(91,155,213,0.08);
  border-radius:8px;border-left:3px solid var(--sky);
  font-size:0.78rem;color:var(--sand);line-height:1.5;
  margin-bottom:1rem;
}
.map-tip .tip-icon{font-size:1rem;flex-shrink:0;margin-top:0.1rem}

/* ===== ANIMATED VAN ===== */
.van-scene{
  position:relative;width:100%;height:120px;
  margin-top:1rem;overflow:hidden;
}
.van-road{
  position:absolute;bottom:12px;left:0;right:0;height:3px;
  background:rgba(255,255,255,0.1);border-radius:2px;
}
.van-road::after{
  content:'';position:absolute;top:0;left:0;
  width:200%;height:100%;
  background:repeating-linear-gradient(90deg,transparent,transparent 12px,rgba(212,168,67,0.3) 12px,rgba(212,168,67,0.3) 24px);
  animation:roadScroll 2s linear infinite;
}
@keyframes roadScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.van-svg{
  position:absolute;bottom:14px;left:50%;
  transform:translateX(-50%);
  width:160px;height:auto;
  animation:vanBounce 1.2s ease-in-out infinite;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
@keyframes vanBounce{
  0%,100%{transform:translateX(-50%) scaleX(-1) translateY(0) rotate(0deg)}
  25%{transform:translateX(-50%) scaleX(-1) translateY(-3px) rotate(0.3deg)}
  75%{transform:translateX(-50%) scaleX(-1) translateY(-2px) rotate(-0.3deg)}
}

.van-dust{
  position:absolute;bottom:10px;left:calc(50% - 90px);
  width:6px;height:6px;background:rgba(242,230,217,0.15);
  border-radius:50%;
  animation:dustPuff 1.5s ease-out infinite;
}
.van-dust:nth-child(2){animation-delay:0.5s;left:calc(50% - 85px);bottom:14px}
.van-dust:nth-child(3){animation-delay:1s;left:calc(50% - 95px);bottom:8px}
@keyframes dustPuff{
  0%{opacity:0.4;transform:scale(1) translateX(0)}
  100%{opacity:0;transform:scale(3) translateX(-30px)}
}

/* stars/scenery */
.van-stars span{
  position:absolute;width:2px;height:2px;background:rgba(255,248,240,0.3);border-radius:50%;
  animation:twinkle 3s ease-in-out infinite;
}
.van-stars span:nth-child(1){top:15px;left:15%;animation-delay:0s}
.van-stars span:nth-child(2){top:25px;left:72%;animation-delay:1.2s}
.van-stars span:nth-child(3){top:8px;left:45%;animation-delay:0.6s}
.van-stars span:nth-child(4){top:30px;left:85%;animation-delay:1.8s}
.van-stars span:nth-child(5){top:12px;left:28%;animation-delay:2.4s}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:0.8}}

/* ===== FULL ROUTE MAP BUTTON ===== */
.route-map-fab{
  position:fixed;
  bottom:calc(62px + var(--safe-b));
  right:1rem;
  z-index:150;
  display:flex;align-items:center;gap:0.5rem;
  padding:0.65rem 1.1rem;
  background:linear-gradient(135deg,var(--gold),#b8922e);
  color:var(--night);
  font-family:'Space Mono',monospace;
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
  border:none;border-radius:100px;
  box-shadow:0 4px 16px rgba(212,168,67,0.35);
  cursor:pointer;
  text-decoration:none;
  transition:transform 0.15s,box-shadow 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.route-map-fab:active{transform:scale(0.95);box-shadow:0 2px 8px rgba(212,168,67,0.25)}
.route-map-fab .fab-icon{font-size:1.1rem;line-height:1}

/* cactus scenery */
.van-cactus{
  position:absolute;bottom:15px;font-size:1.2rem;
  animation:sceneryScroll 8s linear infinite;
  opacity:0.25;
}
.van-cactus:nth-child(1){animation-delay:0s}
.van-cactus:nth-child(2){animation-delay:2.5s;font-size:0.9rem;bottom:16px}
.van-cactus:nth-child(3){animation-delay:5s;font-size:1rem}
@keyframes sceneryScroll{
  0%{right:-30px;opacity:0}
  5%{opacity:0.25}
  90%{opacity:0.25}
  100%{right:110%;opacity:0}
}

/* timed schedule (Day 3 Grand Canyon) */
.tl-timed-schedule{
  margin:0.5rem 0 0.75rem 1.5rem;
  padding:0.75rem 1rem;
  background:rgba(212,168,67,0.08);
  border-left:3px solid var(--gold);
  border-radius:0 10px 10px 0;
}
.tl-timed-schedule h4{
  font-family:'Space Mono',monospace;font-size:0.65rem;
  text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);
  margin-bottom:0.5rem;
}
.tl-timed-item{
  display:flex;gap:0.6rem;padding:0.25rem 0;
  font-size:0.78rem;color:var(--sand);line-height:1.4;
}
.tl-timed-item .tl-time{
  font-family:'Space Mono',monospace;font-size:0.65rem;
  color:var(--sky);flex-shrink:0;min-width:60px;padding-top:0.1rem;
}
.tl-timed-item .tl-event{flex:1}
.tl-timed-item.highlight{
  background:rgba(212,168,67,0.1);border-radius:6px;
  padding:0.4rem 0.5rem;margin:0.15rem -0.5rem;
}
.tl-timed-item.highlight .tl-event{font-weight:600;color:var(--gold)}

/* timeline van marker */
.tl-van-marker{
  display:inline-block;font-size:1rem;
  animation:vanWiggle 2s ease-in-out infinite;
  margin-right:0.3rem;
}
@keyframes vanWiggle{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}
</style>
</head>
<body>

<!-- ===== DASHBOARD VIEW ===== -->
<div class="view active" id="viewDash">
  <div class="dash-header" id="dashHeader">
    <div class="dash-day-label" id="dashDayLabel"></div>
    <div class="dash-title" id="dashTitle"></div>
    <div class="dash-subtitle" id="dashSub"></div>
    <div class="van-scene">
      <div class="van-stars"><span></span><span></span><span></span><span></span><span></span></div>
      <div class="van-cactus">🌵</div>
      <div class="van-cactus">🌵</div>
      <div class="van-cactus">🌵</div>
      <div class="van-dust"></div>

function mapUrl(addr){
  const e=encodeURIComponent(addr);
  const iOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  return iOS?'maps://maps.apple.com/?q='+e:'https://www.google.com/maps/search/?api=1&query='+e;
}

function addrLink(addr,label){
  if(!addr)return'';
  return `<a class="tl-stop-addr" href="${mapUrl(addr)}" target="_blank" rel="noopener"><i class="pin">📍</i>${label||addr}</a>`;
}

let currentDay = 2; // default to Day 1

function renderDash(){
  const d=DAYS[currentDay];
  document.getElementById('dashDayLabel').textContent=d.label;
  document.getElementById('dashTitle').textContent=d.title;
  document.getElementById('dashSub').textContent=[d.sub,d.miles,d.hrs].filter(Boolean).join(' · ');

  // weather
  const wEl=document.getElementById('dashWeather');
  wEl.innerHTML=d.weather.map(w=>`
    <div class="dash-wx">
      <div class="wx-city">${w.city}</div>
      <div class="wx-ico">${w.icon}</div>
      <div class="wx-hi">${w.hi} <span class="wx-lo">/ ${w.lo}</span></div>
    </div>`).join('');

  // pills
  const pEl=document.getElementById('dayPills');
  pEl.innerHTML=DAYS.map((day,i)=>`<div class="day-pill${i===currentDay?' active':''}" data-day="${i}">${day.pill}</div>`).join('');
  pEl.querySelectorAll('.day-pill').forEach(p=>p.addEventListener('click',()=>{
    currentDay=+p.dataset.day;renderDash();
  }));

  // next-up cards
  const cards=document.getElementById('nextCards');
  if(d.stops.length===0){
    cards.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--dim)">
      ${currentDay===0?'Arrive & rest up tonight. Prep day tomorrow!':'Head to the Prep tab for your checklist →'}</div>`;
    return;
  }

  // Pick highlights: first fuel, first food, first sight, first sleep, first shop
  const picks=[];
  const types=['fuel','food','sight','shop','sleep'];
  types.forEach(t=>{
    const s=d.stops.find(s=>s.type===t);
    if(s)picks.push(s);
  });
  // add more food/sleep if room
  d.stops.filter(s=>s.type==='food'&&!picks.includes(s)).slice(0,2).forEach(s=>picks.push(s));
  d.stops.filter(s=>s.type==='sleep'&&!picks.includes(s)).slice(0,1).forEach(s=>picks.push(s));
  // add notes
  d.stops.filter(s=>s.type==='note').forEach(s=>picks.push(s));

  // dedupe and maintain order from original stops array
  const seen=new Set();const ordered=[];
  d.stops.forEach(s=>{if(picks.includes(s)&&!seen.has(s)){seen.add(s);ordered.push(s)}});

  cards.innerHTML=ordered.map(s=>{
    const href=s.mapUrl||mapUrl(s.addr||s.name);
    const target='target="_blank" rel="noopener"';
    const iconClass=s.type==='sleep'?'sleep':s.type;
    const warn=s.warn?`<span class="tl-stop-warn">must fill</span>`:'';
    const tag=s.tag?`<span class="tl-stop-tag ${s.tag}">${s.tag==='rv'?'Campground':'Hotel'}</span>`:'';
    return `<a class="next-card" href="${href}" ${target}>
      <div class="nc-icon ${iconClass}">${ICONS[s.type]}</div>
      <div class="nc-body">
        <div class="nc-label">${s.type==='sleep'?'Stay':s.type==='shop'?'Resupply':s.type==='note'?'Heads up':s.type.charAt(0).toUpperCase()+s.type.slice(1)}${warn}</div>
        <div class="nc-name">${s.name} ${tag}</div>
        <div class="nc-detail">${s.desc||''}</div>
      </div>
      ${s.mile?`<div class="nc-mile">${s.mile}</div>`:''}
      ${s.addr?`<div class="nc-arrow">›</div>`:''}
    </a>`;
  }).join('');
}

function stripMap(title,stops,warning){
  const totalMi=stops[stops.length-1].mi;
  const w=Math.max(stops.length*100,340);
  const pad=40;
  const lineW=w-pad*2;
  const h=130;
  const lineY=50;

  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="min-width:${w}px">`;

  // Route line
  svg+=`<line x1="${pad}" y1="${lineY}" x2="${w-pad}" y2="${lineY}" stroke="rgba(255,255,255,0.12)" stroke-width="3" stroke-linecap="round"/>`;

  // Dashed center line
  svg+=`<line x1="${pad}" y1="${lineY}" x2="${w-pad}" y2="${lineY}" stroke="rgba(212,168,67,0.3)" stroke-width="1" stroke-dasharray="6,4"/>`;

  stops.forEach((s,i)=>{
    const x=pad+(s.mi/totalMi)*lineW;
    const dotR=i===0||i===stops.length-1?6:4;
    const color=s.warn?'#C4734F':i===0?'#7A8B6F':i===stops.length-1?'#D4A843':'rgba(255,248,240,0.5)';

    // Dot
    svg+=`<circle cx="${x}" cy="${lineY}" r="${dotR}" fill="${color}"/>`;

    // Distance label between stops
    if(i>0){
      const prevX=pad+(stops[i-1].mi/totalMi)*lineW;
      const midX=(prevX+x)/2;
      const dist=s.mi-stops[i-1].mi;
      svg+=`<text x="${midX}" y="${lineY-10}" text-anchor="middle" font-family="'Space Mono',monospace" font-size="9" fill="rgba(212,168,67,0.6)">${dist}mi</text>`;
    }

    // City name (alternate above/below to avoid overlap)
    const textY=i%2===0?lineY+22:lineY+34;
    svg+=`<text x="${x}" y="${textY}" text-anchor="middle" font-family="Outfit,sans-serif" font-size="10" font-weight="600" fill="rgba(255,248,240,0.75)">${s.name}</text>`;

    // Icons below name
    if(s.icon){
      const iconY=i%2===0?lineY+35:lineY+47;
      svg+=`<text x="${x}" y="${iconY}" text-anchor="middle" font-size="9">${s.icon}</text>`;
    }
  });

  svg+=`</svg>`;

  let warnHtml=warning?`<div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--clay);margin-top:0.5rem;text-align:center">${warning}</div>`:'';

  return `<div class="strip-map">
    <div class="strip-map-label">${title}</div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0.5rem 0">${svg}</div>
    ${warnHtml}
  </div>`;
}
